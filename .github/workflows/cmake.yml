name: Tests

on: [push]

jobs:
  build:
    name: "${{ matrix.configurations.name }} | ${{ matrix.cmake-build-type }}"
    runs-on: ${{ matrix.configurations.os }}
    strategy:
      fail-fast: false
      matrix:
        configurations:
          - name: Ubuntu 24.04
            os: ubuntu-24.04
            cmake_env:
              CC: gcc-14
              CXX: g++-14
        cmake-build-type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install -y \
          g++-14 cmake ninja-build clang-format-20

    - name: Create Build Environment
      run: cmake -E make_directory ${{runner.workspace}}/build

    - name: Configure CMake
      working-directory: ${{runner.workspace}}/build
      run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} -G Ninja
      env: ${{ matrix.configurations.cmake_env }}

    - name: Build
      working-directory: ${{runner.workspace}}/build
      run: cmake --build . --config ${{ matrix.cmake-build-type }}
      env: ${{ matrix.configurations.cmake_env }}

    - name: Test
      working-directory: ${{runner.workspace}}/build
      run: ctest -C ${{ matrix.cmake-build-type }} --output-on-failure

    - name: Verify committed header is up to date
      working-directory: ${{github.workspace}}
      run: git diff --exit-code -- include/get_code_point_name.hpp
