name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            g++-14 cmake ninja-build clang-format

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Download UnicodeData.txt
        run: |
          curl -fL "https://unicode.org/Public/14.0.0/ucd/UnicodeData.txt" \
               -o build/UnicodeData.txt
